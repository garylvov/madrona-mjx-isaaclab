context:
  version: "0.3.0"

package:
  name: madrona-mjx-isaaclab
  version: ${{ version }}

source:
  path: ..

build:
  number: 0
  script:
    file: build.sh
  dynamic_linking:
    # rpaths are set by hand in build.sh (patchelf $ORIGIN closure inside
    # site-packages/madrona_mjx); the relinker cannot improve on them and
    # errors trying ("new value is longer than old value")
    binary_relocation: false
    missing_dso_allowlist:
      - "libcuda.so*"
      # resolved at runtime relative to the shipped libs ($ORIGIN rpath); the
      # relocation scanner does not follow our patchelf'd rpaths
      - "libdxcompiler.so"
      - "libmadmjx_mgr.so"
      - "libmadrona_std_mem.so"
      - "libmadrona_render_shader_compiler.so"
      - "libembree4.so*"
      - "libglfw.so*"
      - "libvulkan.so*"

requirements:
  build:
    - cmake
    - make
    - patchelf
    # 2.34 keeps the binaries deployable on libc>=2.35 hosts (gigastrap's
    # isaaclab system-requirement); an unpinned sysroot resolves to 2.39 and
    # leaks __isoc23_* (glibc 2.38) symbols into libmadmjx_mgr.so
    - sysroot_linux-64 2.34.*
  host:
    # variant-pinned via conda/variants.yaml (3.12 canonical, 3.11 for Isaac Sim)
    - python
    - cuda-nvcc
    - cuda-cudart-dev
    - cuda-nvrtc-dev
    # keep nvjitlink on the same minor as cuda-version: its run-export pins
    # the consumer env, and gigastrap holds cuda-toolkit 12.8.*
    - libnvjitlink-dev 12.8.*
    - cuda-cccl
    - cuda-version 12.8.*
  run:
    - python
    # renderer.py carries a compat shim for both old (0.5.x) and modern jax
    - jax
    - cuda-cudart
    - cuda-nvrtc
    - libnvjitlink
    # headers: madrona compiles its GPU device code at runtime with NVRTC and
    # the baked -I flags point at $PREFIX/targets/x86_64-linux/include
    - cuda-cudart-dev
    - cuda-cccl
    # NOT a run dep on purpose: madrona_mjx.renderer imports mujoco.mjx, but
    # gigastrap provides mujoco via pip (py.mujoco.org); a conda mujoco here
    # would clobber it. Consumers must provide mujoco>=3.3.3 themselves.

tests:
  - script:
      # Driverless machines (CI runners) cannot resolve libcuda.so.1; link
      # the CUDA driver stub so the extension can at least be loaded.
      - >-
        if ! ldconfig -p | grep -q libcuda.so.1; then
        mkdir -p "$PREFIX/lib/stub-ld" &&
        ln -sf "$PREFIX/targets/x86_64-linux/lib/stubs/libcuda.so" "$PREFIX/lib/stub-ld/libcuda.so.1" &&
        export LD_LIBRARY_PATH="$PREFIX/lib/stub-ld:$LD_LIBRARY_PATH";
        fi;
        python -c "import madrona_mjx"
      - python -c "import madrona_mjx_isaaclab.mesh_decimation.spec"
    requirements:
      run:
        - mujoco-mjx
        - cuda-driver-dev

about:
  summary: Madrona MJX batch renderer (maintained fork; upstream shacklettbp/madrona_mjx is unmaintained)
  license: MIT
  repository: https://github.com/garylvov/madrona-mjx-isaaclab
