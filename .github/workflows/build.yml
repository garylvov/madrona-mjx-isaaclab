name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  conda-build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      # The build needs ~10GB (CUDA host packages, madrona toolchain bundle,
      # two python-variant builds); clear preinstalled runner bloat first.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          cache: true

      # Builds both variants (python 3.12 canonical + 3.11 for Isaac Sim).
      # No GPU on hosted runners: compilation and the recipe's import test
      # work without one (all device code is runtime-NVRTC); the GPU render
      # tests (scripts/standalone_smoke.py) only run locally.
      - name: Build conda packages
        run: pixi run conda-build

      - uses: actions/upload-artifact@v4
        with:
          name: conda-packages
          path: conda/output/linux-64/*.conda
          if-no-files-found: error

      # Publish on tagged releases. Requires the PREFIX_API_KEY repo secret
      # (prefix.dev API key with write access to the garylvov channel).
      - name: Upload to prefix.dev
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          PREFIX_API_KEY: ${{ secrets.PREFIX_API_KEY }}
        run: pixi run conda-upload
